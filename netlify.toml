[build]
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# Cache JSON data files — improves repeat load speed
[[headers]]
  for = "/_data/*"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=60"

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/shop/order-confirmed"
  to = "/shop/order-confirmed.html"
  status = 200

[[redirects]]
  from = "/blog/post"
  to = "/blog/post.html"
  status = 200

[[redirects]]
  from = "/donate/thank-you"
  to = "/donate/thank-you.html"
  status = 200

[[redirects]]
  from = "/courses/registration-confirmed"
  to = "/courses/registration-confirmed.html"
  status = 200

# Cache images & root logos
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logo-colour.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/logo-white.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[redirects]]
  from = "/contact-success"
  to = "/contact-success.html"
  status = 200
