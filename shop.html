<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop — Baseerah Institute</title>

  <meta name="description" content="Browse Arabic workbooks, Hifth guides and Fiqh texts from Baseerah Institute. Muhadathah Workbooks, Hifth Educator's Manual and more."/>
  <meta name="keywords" content="Islamic institute Cape Town, Arabic classes Cape Town, Hifth programme Cape Town, learn Arabic women, female Islamic education South Africa"/>
  <link rel="canonical" href="https://baseerahinstitute.org/shop.html"/>

  <meta property="og:site_name"   content="Baseerah Institute"/>
  <meta property="og:type"        content="website"/>
  <meta property="og:title"       content="Shop — Baseerah Institute"/>
  <meta property="og:description" content="Arabic workbooks, Hifth guides and Fiqh texts. Order online for collection in Athlone or from Chapter 96 Bookz."/>
  <meta property="og:image"       content="/images/og-default.jpg"/>
  <meta property="og:url"         content="https://baseerahinstitute.org/shop.html"/>
  <meta name="twitter:card"        content="summary_large_image"/>
  <meta name="twitter:title"       content="Shop — Baseerah Institute"/>
  <meta name="twitter:description" content="Arabic workbooks, Hifth guides and Fiqh texts from Baseerah Institute."/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div id="bar-container"></div>
<div id="nav-container"></div>

<!-- ─── Page Hero ─── -->
<section class="page-hero">
  <div class="wrap">
    <div class="page-hero-text">
      <span class="eyebrow">Books &amp; Resources</span>
      <h1>The <em>Shop</em></h1>
      <p>Workbooks, guides and texts authored or curated by Baseerah Institute.</p>
    </div>
  </div>
</section>

<!-- ─── Products ─── -->
<section style="padding:60px 0 80px;background:var(--cream)">
  <div class="wrap">

    <!-- Filter tabs -->
    <div class="filter-tabs" style="margin-bottom:40px">
      <button class="ftab active" data-filter="all">All</button>
      <button class="ftab" data-filter="arabic">Arabic</button>
      <button class="ftab" data-filter="hifth">Hifth</button>
      <button class="ftab" data-filter="fiqh">Fiqh</button>
    </div>

    <!-- Products rendered by app.js -->
    <div id="products-container">
      <div class="shop-grid">
        <div class="skeleton-card product"><div class="skeleton skeleton-img" style="height:260px"></div><div class="skeleton-body"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line title"></div><div class="skeleton skeleton-line"></div></div></div>
        <div class="skeleton-card product"><div class="skeleton skeleton-img" style="height:260px"></div><div class="skeleton-body"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line title"></div><div class="skeleton skeleton-line"></div></div></div>
        <div class="skeleton-card product"><div class="skeleton skeleton-img" style="height:260px"></div><div class="skeleton-body"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line title"></div><div class="skeleton skeleton-line"></div></div></div>
      </div>
    </div>

  </div>
</section>

<!-- ─── Stockists ─── -->
<section class="stockists" id="stockists">
  <div class="wrap">
    <div class="sec-head reveal">
      <span class="eyebrow">Where to Buy</span>
      <h2>Collection <em>points</em></h2>
      <p>Order online or collect from one of our stockists.</p>
    </div>
    <!-- Rendered by app.js -->
    <div id="stockists-container">
      <div class="stockists-grid">
        <div class="skeleton-card stockist-card" style="height:200px"></div>
        <div class="skeleton-card stockist-card" style="height:200px"></div>
      </div>
    </div>
  </div>
</section>

<!-- ─── Payment logos ─── -->
<div id="payment-logos-container"></div>

<!-- ─── Order Modal ─── -->
<div class="modal-overlay" id="orderOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <h3>Place an Order</h3>
    <p class="modal-book" id="modal-book-title"></p>
    <form name="book-order" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/shop.html">
      <input type="hidden" name="form-name" value="book-order"/>
      <input type="hidden" name="bot-field"/>
      <input type="hidden" name="product" id="modal-product-input"/>
      <div class="form-row">
        <div class="form-group"><label>Full Name *</label><input type="text" name="name" required placeholder="Fatimah Hendricks"/></div>
        <div class="form-group"><label>Email *</label><input type="email" name="email" required placeholder="you@example.com"/></div>
      </div>
      <div class="form-group"><label>Phone / WhatsApp *</label><input type="tel" name="phone" required placeholder="+27 06x xxx xxxx"/></div>
      <div class="form-group">
        <label>Quantity</label>
        <select name="quantity">
          <option value="1">1</option><option value="2">2</option>
          <option value="3">3</option><option value="5">5</option>
        </select>
      </div>
      <div class="form-group"><label>Collection point</label>
        <select name="collection_point">
          <option value="Baseerah Institute (Athlone)">Baseerah Institute — Athlone</option>
          <option value="Chapter 96 Bookz (Lansdowne)">Chapter 96 Bookz — Lansdowne</option>
        </select>
      </div>
      <div class="form-group"><label>Notes (optional)</label><textarea name="notes" rows="2"></textarea></div>
      <button type="submit" class="btn btn-primary form-submit">Submit Order</button>
      <p class="form-note">We'll confirm your order within 1 business day.</p>
    </form>
  </div>
</div>

<!-- Footer -->
<div id="footer-container"></div>

<script src="js/components.js"></script>
<script src="js/app.js"></script>

</body>
</html>
